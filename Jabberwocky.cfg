[metadata]
toolhead: Jabberwocky
extruder: Jabberwocky
hotend: Conch
is_cut_tip: 1
author: kinematicdigit
notes:
  Based on JW sample configs located [here](https://github.com/kinematicdigit/Jabberwocky/tree/main/Sample_Configs). Toolhead measurements contributed by **NameOfTheDragon**

[gcode_macro _MMU_CUT_TIP_VARS]
_file: mmu_macro_vars.cfg
variable_blade_pos              : 63.6   ; TUNE ME: Distance in mm from internal nozzle tip
variable_retract_length         : 58.6    ; TUNE ME: 5mm less than 'blade_pos' is a good starting point
variable_simple_tip_forming     : True        ; True = Perform simple tip forming, False = skip
variable_rip_length             : 2.0        ; Distance in mm to retract to aid lever decompression (>= 0)
variable_rip_speed              : 3        ; Speed mm/s
variable_pushback_length        : 15.0        ; TUNE ME: PTFE tube length + 3mm is good starting point
variable_pushback_dwell_time    : 0        ; Time in ms to dwell after the pushback
variable_extruder_move_speed    : 25        ; Speed mm/s for all extruder movement

[mmu]
_file: mmu_parameters.cfg
toolhead_extruder_to_nozzle: 86
toolhead_sensor_to_nozzle: 74.3
toolhead_entry_to_extruder: 8.9
toolhead_residual_filament: 22.5
form_tip_macro: _MMU_CUT_TIP
