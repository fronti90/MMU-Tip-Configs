[metadata]
toolhead: AntHead
extruder: Wristwatch G2
hotend: TZv6
is_cut_tip: 1
author: burkfers
notes: This uses the stock Bambulab nozzle, not a v6. The hotend is Dragon-length.

[gcode_macro _MMU_CUT_TIP_VARS]
_file: mmu_macro_vars.cfg
variable_blade_pos              : 38
variable_retract_length         : 34
variable_pushback_length        : 20.0

[mmu]
_file: mmu_parameters.cfg
toolhead_extruder_to_nozzle: 68.6
toolhead_sensor_to_nozzle: 50.9
toolhead_entry_to_extruder: 13
toolhead_residual_filament: 1.2
toolhead_ooze_reduction: 0
form_tip_macro: _MMU_CUT_TIP
