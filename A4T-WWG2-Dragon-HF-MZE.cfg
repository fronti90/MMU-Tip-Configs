extruder: Wristwatch G2
hotend: Dragon HF MZE
author: PatoInquisidor
notes: Using a dual filament sensor WWG2 [mod](https://www.printables.com/model/1186399-optimized-wristwatch-g2-dual-filament-sensor) and a Crossbow cutter.
