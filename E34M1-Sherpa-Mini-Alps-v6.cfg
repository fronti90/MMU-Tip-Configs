[metadata]
toolhead: E34M1
extruder: Sherpa Mini
hotend: Alps v6
is_form_tip: 1
author: 53Aries
notes: Ramming over purge bucket via [custom park macro](https://github.com/53Aries/SPOne.1/tree/main/printer_data/config/mmu). 

[gcode_macro _MMU_FORM_TIP_VARS]
_file: mmu_macro_vars.cfg
variable_ramming_volume            : 0		
variable_ramming_volume_standalone : 0		
variable_toolchange_temp        : 0		
variable_toolchange_fan_assist  : False		
variable_toolchange_fan_name    : ''		
variable_toolchange_fan_speed   : 50		
variable_unloading_speed_start  : 80		
variable_unloading_speed        : 18		
variable_cooling_tube_position  : 35		
variable_cooling_tube_length    : 10		
variable_initial_cooling_speed  : 10		
variable_final_cooling_speed    : 50		
variable_cooling_moves          : 4		
variable_use_skinnydip          : False
variable_skinnydip_distance     : 30
variable_dip_insertion_speed    : 30
variable_dip_extraction_speed   : 70		
variable_melt_zone_pause        : 0		
variable_cooling_zone_pause     : 0		
variable_use_fast_skinnydip     : False		
variable_parking_distance       : 0
variable_extruder_eject_speed   : 25		

[mmu]
_file: mmu_parameters.cfg
form_tip_macro: _MMU_FORM_TIP
toolhead_extruder_to_nozzle: 72
toolhead_sensor_to_nozzle: 62
toolhead_entry_to_extruder: 8
toolhead_residual_filament: 4
toolhead_ooze_reduction: 0