[metadata]
toolhead: XOL-Metrix
extruder: Sherpa Mini CNC
hotend: Rapido 1 UHF
is_cut_tip: 1
author: GcodeGearHead

[gcode_macro _MMU_CUT_TIP_VARS]
_file: mmu_macro_vars.cfg
variable_blade_pos: 73
variable_retract_length: 12
variable_simple_tip_forming: False
variable_rip_length: 1.0
variable_rip_speed: 3
variable_pushback_length: 10.0
variable_pushback_dwell_time: 0
variable_evacuate_speed: 150
variable_cut_dwell_time: 50
variable_cut_fast_move_fraction: 1.0
variable_extruder_move_speed: 25

[mmu]
_file: mmu_parameters.cfg
form_tip_macro: _MMU_CUT_TIP
toolhead_extruder_to_nozzle: 102
toolhead_sensor_to_nozzle: 82
toolhead_entry_to_extruder: 38
toolhead_residual_filament: 40
toolhead_ooze_reduction: 0